<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>TO-DO LIST</title>
</head>

<body>
    
    <main id="main-container">

        <section id="background"></section>

        <section id="container-to-do-list">
            
            <div id="to-do-list">
                <h1>Lista de Tarefas</h1>

                <div id="add-task">
                    <input type="text" name="task" id="add-task-input" placeholder="Nova tarefa">
                    <button id="add-task-button">+</button>
                </div>

                <div id="added-tasks">
                    <ul>

                    </ul>
                </div>

                <div id="clear-info-tasks">
                    <p>Você possui <span id="total-tasks-info">0</span> pendências</p>
                    <button id="clear-tasks-button">Limpar</button>
                </div>

            </div>

        </section>

    </main>

    <script src="main.js"></script>
</body>

</html>
